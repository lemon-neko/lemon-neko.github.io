<body>

  <main class="container" id="home">
    <section id="intro">
      <h2>欢迎</h2>

      <p>很高兴你来到这里。</p>

  <footer class="site-footer" role="contentinfo">

    <div class="footer-links">
      <a href="https://github.com/lemon-neko" target="_blank" rel="noopener">GitHub</a>
      <a href="#" target="_blank" rel="noopener">Twitter</a>
    </div>

  <button id="back-to-top" aria-label="回到顶部">↑</button>

  <script>
    // set year
    document.getElementById('year').textContent = new Date().getFullYear();

    // Theme: read/write localStorage, set .dark on documentElement
    const themeToggle = document.getElementById('theme-toggle');
    function getStoredTheme() { return localStorage.getItem('site-theme'); }
    function applyTheme(theme) {
      if (theme === 'dark') document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
    }
    const initial = getStoredTheme() || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    applyTheme(initial);
    themeToggle?.addEventListener('click', () => {
      const now = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
      const next = now === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('site-theme', next);
    });

    // Mobile menu
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const mobileMenuClose = document.getElementById('mobile-menu-close');
    mobileMenuBtn?.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
      mobileMenu.setAttribute('aria-hidden', String(mobileMenu.classList.contains('hidden')));
    });
    mobileMenuClose?.addEventListener('click', () => mobileMenu.classList.add('hidden'));

    // Reading progress
    const progress = document.getElementById('reading-progress');
    window.addEventListener('scroll', () => {
      const scrolled = (document.documentElement.scrollTop || document.body.scrollTop) / (document.documentElement.scrollHeight - document.documentElement.clientHeight);
      progress.style.width = Math.min(100, Math.max(0, scrolled * 100)) + '%';
      // back-to-top
      const back = document.getElementById('back-to-top');
      if ((document.documentElement.scrollTop || document.body.scrollTop) > 300) back.classList.add('visible'); else back.classList.remove('visible');
    });

    // Back to top
    document.getElementById('back-to-top')?.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  </script>
</body>
</html>
