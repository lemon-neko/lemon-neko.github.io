<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>柠檬茶与猫 — 个人网站</title>
  <meta name="description" content="柠檬茶与猫的个人网站 — AI、项目与随笔。" />
  <meta name="keywords" content="柠檬茶与猫, 个人网站, AI, 博客" />
  <meta name="author" content="柠檬茶与猫" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#6b46ff" />

  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="柠檬茶与猫 — 个人网站" />
  <meta property="og:description" content="柠檬茶与猫的个人网站 — AI、项目与随笔。" />
  <meta property="og:image" content="https://raw.githubusercontent.com/adongwanai/adongwanai.github.io/main/public/placeholder-hero.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
</head>
<body>
  <nav class="site-nav" role="navigation" aria-label="主导航">
    <div class="nav-brand">柠檬茶与猫</div>

    <ul class="desktop-links">
      <li><a href="#home">首页</a></li>
      <li><a href="#about">关于</a></li>
      <li><a href="#contact">联系</a></li>
    </ul>

    <div class="nav-actions">
      <button id="theme-toggle" class="theme-toggle" aria-label="切换主题">🌓</button>
      <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="打开菜单">☰</button>
    </div>
  </nav>

  <div id="mobile-menu" class="hidden" aria-hidden="true">
    <button id="mobile-menu-close" aria-label="关闭菜单">✕</button>
    <nav>
      <a href="#home">首页</a>
      <a href="#about">关于</a>
      <a href="#contact">联系</a>
      <a href="https://github.com/lemon-neko" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </div>

  <!-- Reading progress bar -->
  <div id="reading-progress"></div>

  <main class="container" id="home">
    <h1>Hello，大家好</h1>
    <p>我是柠檬茶与猫，这是我的个人网站。</p>
    <p>很高兴你来到这里。</p>

    <section id="about" aria-labelledby="about-heading">
      <h2 id="about-heading">关于我</h2>
      <p>这里可以写一些自我介绍、兴趣爱好或展示链接（比如博客、作品集）。</p>
    </section>

    <section id="contact" aria-labelledby="contact-heading">
      <h2 id="contact-heading">联系我</h2>
      <p>可以在这里放置邮箱、社交媒体链接，或一个简单的联系表单（如果需要）。</p>
    </section>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div>© <span id="year"></span> 柠檬茶与猫 — 版权所有</div>
    <div class="footer-links">
      <a href="https://github.com/lemon-neko" target="_blank" rel="noopener">GitHub</a>
      <a href="#" target="_blank" rel="noopener">Twitter</a>
    </div>
  </footer>

  <button id="back-to-top" aria-label="回到顶部">↑</button>

  <script>
    // set year
    document.getElementById('year').textContent = new Date().getFullYear();

    // Theme: read/write localStorage, set .dark on documentElement
    const themeToggle = document.getElementById('theme-toggle');
    function getStoredTheme() {
      return localStorage.getItem('site-theme');
    }
    function applyTheme(theme) {
      if (theme === 'dark') document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
    }
    const initial = getStoredTheme() || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    applyTheme(initial);
    themeToggle?.addEventListener('click', () => {
      const now = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
      const next = now === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('site-theme', next);
    });

    // Mobile menu
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const mobileMenuClose = document.getElementById('mobile-menu-close');
    mobileMenuBtn?.addEventListener('click', () => {
      const isOpen = mobileMenu.classList.toggle('hidden');
      mobileMenu.setAttribute('aria-hidden', String(isOpen));
      // also toggle overlay class if present
      const overlay = document.getElementById('mobile-menu-overlay');
      if (overlay) overlay.classList.toggle('open');
    });
    mobileMenuClose?.addEventListener('click', () => mobileMenu.classList.add('hidden'));

    // Reading progress
    const progress = document.getElementById('reading-progress');
    window.addEventListener('scroll', () => {
      const scrolled = (document.documentElement.scrollTop || document.body.scrollTop) / (document.documentElement.scrollHeight - document.documentElement.clientHeight);
      progress.style.width = Math.min(100, Math.max(0, scrolled * 100)) + '%';
      // back-to-top
      const back = document.getElementById('back-to-top');
      if ((document.documentElement.scrollTop || document.body.scrollTop) > 300) back.classList.add('visible'); else back.classList.remove('visible');
    });

    // Back to top
    document.getElementById('back-to-top')?.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  </script>
</body>
</html>
